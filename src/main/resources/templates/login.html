<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PFS Console — 로그인</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
            padding: 40px 40px 36px;
            width: 100%;
            max-width: 380px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .brand .logo {
            width: 36px; height: 36px;
            background: #2563eb;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; color: #fff;
            flex-shrink: 0;
        }
        .brand h1 {
            font-size: 17px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: .2px;
        }
        .brand .sub {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 400;
        }

        .alert-err {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .alert-ok {
            background: #f0fdf4;
            border: 1px solid #86efac;
            color: #166534;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 13px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,.12);
            background: #fff;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background .15s;
        }
        .btn-login:hover { background: #1d4ed8; }

        .footer-note {
            margin-top: 20px;
            font-size: 11.5px;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand">
        <div class="logo">PF</div>
        <div>
            <h1>PFS Console</h1>
            <div class="sub">Portfolio Fund Statement</div>
        </div>
    </div>

    <div th:if="${param.error}" class="alert-err">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div>
    <div th:if="${param.logout}" class="alert-ok">
        로그아웃 되었습니다.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" autofocus autocomplete="username" placeholder="아이디 입력">
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="비밀번호 입력">
        </div>
        <button type="submit" class="btn-login">로그인</button>
    </form>

    <p class="footer-note">HSBC SEL PFS &copy; 2026</p>
</div>

</body>
</html>
